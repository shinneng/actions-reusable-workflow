name: Renovate

on:
  schedule:
    # Run once per day; adjust cron as needed (UTC)
    - cron: '0 1 * * *'
  workflow_dispatch: {}

permissions:
  # Renovate uses the GitHub API and does not strictly require a local checkout.
  # Add `contents: write` in case you want the runner to perform git-based pushes
  # (not required for the API-driven Renovate action).
  contents: write
  pull-requests: write

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (optional)
        uses: actions/checkout@v6

      - name: Run renovate
        uses: renovatebot/github-action@v46.1.14
        env:
          # This successfully passes the current repo into the container
          RENOVATE_REPOSITORIES: ${{ github.repository }}
        with:
          # Use the default GITHUB_TOKEN to create PRs
          token: ${{ secrets.GITHUB_TOKEN }}
